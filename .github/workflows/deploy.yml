name: CI and Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Test backend
        working-directory: backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: /api
        run: npm run build

      - name: Validate Docker Compose
        run: |
          cp .env.docker.example .env.docker || true
          docker compose config --quiet
          rm -f .env.docker

  deploy:
    name: Deploy to EC2
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ secrets.DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          KNOWN_HOSTS: ${{ secrets.EC2_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload application
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude '.next/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '*.pem' \
            -e ssh \
            ./ "$USER@$HOST:/home/ubuntu/Networking/"

      - name: Build and restart Docker services
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh "$USER@$HOST" '
            set -e
            cd /home/ubuntu/Networking
            test -f .env
            test -f .env.docker
            docker compose config --quiet
            docker compose up --build -d --remove-orphans
            docker compose ps
            curl --retry 12 --retry-delay 5 --retry-connrefused --fail http://127.0.0.1:8080/healthz
            curl --retry 12 --retry-delay 5 --retry-connrefused --fail http://127.0.0.1:8080/api/health
            docker image prune -f
          '

      - name: Verify public HTTPS
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          curl --retry 12 --retry-delay 5 --fail "https://$DOMAIN/healthz"
          curl --retry 12 --retry-delay 5 --fail "https://$DOMAIN/api/health"
